<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDS Viewer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f5f5f5;
        color: #333;
      }
      .app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      header {
        padding: 12px 20px;
        background: #fff;
        border-bottom: 1px solid #ddd;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      header h1 {
        font-size: 18px;
        font-weight: 600;
      }
      .header-controls {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .upload-btn {
        padding: 8px 16px;
        background: #4a4a8a;
        border: none;
        border-radius: 6px;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
      }
      .upload-btn:hover {
        background: #5a5a9a;
      }
      #file-input,
      #lyp-input,
      #pair-input {
        display: none;
      }
      .main-content {
        flex: 1;
        display: flex;
        overflow: hidden;
      }
      .sidebar {
        width: 280px;
        background: #fff;
        border-right: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header {
        padding: 12px 16px;
        border-bottom: 1px solid #eee;
        font-weight: 600;
        font-size: 14px;
        color: #666;
        background: #fafafa;
      }
      .file-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }
      .file-item {
        padding: 10px 16px;
        cursor: pointer;
        font-size: 13px;
        border-left: 3px solid transparent;
        transition: all 0.15s ease;
        word-break: break-word;
      }
      .file-item:hover {
        background: #f0f0f5;
      }
      .file-item.active {
        background: #e8e8f0;
        border-left-color: #4a4a8a;
        font-weight: 500;
      }
      .file-item.loading {
        opacity: 0.6;
        pointer-events: none;
      }
      .viewer-container {
        flex: 1;
        position: relative;
      }
      gds-viewer {
        width: 100%;
        height: 100%;
        display: block;
      }
      .drop-zone {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(74, 74, 138, 0.2);
        border: 3px dashed #4a4a8a;
        border-radius: 12px;
        margin: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .drop-zone.active {
        opacity: 1;
        pointer-events: auto;
      }
      .drop-zone p {
        font-size: 20px;
        color: #4a4a8a;
      }
      .loading-indicator {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255,255,255,0.95);
        padding: 20px 28px;
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        font-size: 14px;
        color: #666;
        display: none;
        text-align: center;
        min-width: 200px;
      }
      .loading-indicator.active {
        display: block;
      }
      .loading-indicator .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #e0e0e0;
        border-top-color: #4a4a8a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>GDS Viewer</h1>
        <div class="header-controls">
          <label class="upload-btn" style="background:#2f5b8a;">
            Open GDS/LYP/JSON
            <input
              type="file"
              id="pair-input"
              accept=".gds,.gdsii,.lyp,.json"
              multiple
            />
          </label>
          <button class="upload-btn" id="process-stack-btn" type="button" style="background:#2b7a4b;">
            Use Sample Stack
          </button>
          <button class="upload-btn" id="derived-geometry-btn" type="button" style="background:#6b4b7a;">
            Use Derived Geometry
          </button>
        </div>
      </header>
      <div class="main-content">
        <div class="sidebar">
          <div class="sidebar-header">Sample GDS Files</div>
          <div class="file-list" id="file-list">
            <div class="file-item" style="color: #999; font-style: italic;">Loading...</div>
          </div>
        </div>
        <div class="viewer-container">
          <gds-viewer id="viewer"></gds-viewer>
          <div class="drop-zone" id="drop-zone">
            <p>Drop GDS file here</p>
          </div>
          <div class="loading-indicator" id="loading-indicator">
            <div class="spinner"></div>
            <div id="loading-text">Loading GDS file...</div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import "./src/index.ts";

      const viewer = document.getElementById("viewer");
      const pairInput = document.getElementById("pair-input");
      const dropZone = document.getElementById("drop-zone");
      const container = document.querySelector(".viewer-container");
      const fileList = document.getElementById("file-list");
      const loadingIndicator = document.getElementById("loading-indicator");
      const sidebar = document.querySelector(".sidebar");
      const processStackBtn = document.getElementById("process-stack-btn");
      const derivedGeometryBtn = document.getElementById("derived-geometry-btn");

      function hideSidebar() {
        sidebar.style.display = "none";
      }

      // GitHub raw content base URLs
      const GITHUB_RAW_BASE = "/samples";
      const GDS_API_URL = "/samples/gds/index.json";
      const LYP_URL = `${GITHUB_RAW_BASE}/klayout/layers.lyp`;
      const PROCESS_STACK_URL = "/examples/process-stack.sample.json";
      const DERIVED_GEOMETRY_URL = "/examples/derived-geometry.sample.json";

      let gdsFiles = [];
      let currentFile = null;
      let lypLoaded = false;

      async function loadDefaultProcessStack() {
        loadingIndicator.classList.add("active");
        try {
          await viewer.loadProcessStackFromUrl(PROCESS_STACK_URL);
        } catch (err) {
          console.warn("Could not load process stack:", err);
          alert("Failed to load Sample process stack JSON.");
        } finally {
          loadingIndicator.classList.remove("active");
        }
      }

      async function loadDefaultDerivedGeometry() {
        loadingIndicator.classList.add("active");
        try {
          await viewer.loadDerivedGeometryFromUrl(DERIVED_GEOMETRY_URL);
        } catch (err) {
          console.warn("Could not load derived geometry:", err);
          alert("Failed to load derived-geometry JSON.");
        } finally {
          loadingIndicator.classList.remove("active");
        }
      }

      // Load LYP file once at startup
      async function loadDefaultLyp() {
        try {
          const response = await fetch(LYP_URL);
          if (!response.ok) throw new Error("Failed to fetch LYP");
          const text = await response.text();
          await viewer.loadLypFromString(text);
          lypLoaded = true;
        } catch (err) {
          console.warn("Could not load default LYP:", err);
        }
      }

      // Fetch list of GDS files from GitHub
      async function fetchGdsFileList() {
        try {
          const response = await fetch(GDS_API_URL);
          if (!response.ok) throw new Error("Failed to fetch file list");
          const files = await response.json();
          gdsFiles = files
            .filter(f => f.name.endsWith(".gds"))
            .map(f => ({
              name: f.name,
              url: f.download_url
            }));
          renderFileList();
        } catch (err) {
          fileList.innerHTML = `<div class="file-item" style="color: #c00;">Failed to load file list</div>`;
          console.error("Error fetching GDS file list:", err);
        }
      }

      // Render the file list in sidebar
      function renderFileList() {
        fileList.innerHTML = gdsFiles.map((file, idx) => `
          <div class="file-item" data-idx="${idx}" title="${file.name}">
            ${file.name.replace(".gds", "")}
          </div>
        `).join("");

        // Add click handlers
        fileList.querySelectorAll(".file-item").forEach(item => {
          item.addEventListener("click", () => {
            const idx = parseInt(item.dataset.idx, 10);
            loadGdsFromUrl(gdsFiles[idx]);
          });
        });
      }

      // Load a GDS file from URL
      async function loadGdsFromUrl(file) {
        if (currentFile === file.url) return;

        // Update UI
        fileList.querySelectorAll(".file-item").forEach(el => {
          el.classList.remove("active", "loading");
        });
        const activeItem = fileList.querySelector(`[data-idx="${gdsFiles.indexOf(file)}"]`);
        if (activeItem) {
          activeItem.classList.add("active", "loading");
        }
        loadingIndicator.classList.add("active");

        try {
          const response = await fetch(file.url);
          if (!response.ok) throw new Error("Failed to fetch GDS file");
          const arrayBuffer = await response.arrayBuffer();
          await viewer.loadGdsFromArrayBuffer(arrayBuffer, file.name);
          currentFile = file.url;
        } catch (err) {
          console.error("Error loading GDS file:", err);
          alert(`Failed to load ${file.name}`);
        } finally {
          loadingIndicator.classList.remove("active");
          if (activeItem) {
            activeItem.classList.remove("loading");
          }
        }
      }

      // Initialize
      loadDefaultLyp();
      fetchGdsFileList();

      pairInput.addEventListener("change", async (e) => {
        const files = Array.from(e.target.files || []);
        const gdsFile = files.find((file) => {
          const name = file.name.toLowerCase();
          return name.endsWith(".gds") || name.endsWith(".gdsii");
        });
        const lypFile = files.find((file) =>
          file.name.toLowerCase().endsWith(".lyp"),
        );
        const jsonFile = files.find((file) =>
          file.name.toLowerCase().endsWith(".json"),
        );

        if (!gdsFile && !lypFile && !jsonFile) return;

        if (gdsFile) {
          hideSidebar();
          currentFile = null;
        }

        async function loadJsonConfig(file) {
          const text = await file.text();
          let parsed;
          try {
            parsed = JSON.parse(text);
          } catch (err) {
            alert("Invalid JSON file.");
            return;
          }

          if (parsed && typeof parsed === "object" && parsed.format === "gds-viewer-derived-geometry@1") {
            await viewer.loadDerivedGeometryFromString(text);
            return;
          }

          await viewer.loadProcessStackFromString(text);
        }

        loadingIndicator.classList.add("active");
        try {
          if (gdsFile && lypFile) {
            await viewer.loadGdsAndLypFiles(gdsFile, lypFile);
            lypLoaded = true;
          } else if (gdsFile && jsonFile) {
            await viewer.loadGdsFile(gdsFile);
            await loadJsonConfig(jsonFile);
          } else if (gdsFile) {
            await viewer.loadGdsFile(gdsFile);
          } else if (lypFile) {
            await viewer.loadLypFile(lypFile);
            lypLoaded = true;
          } else if (jsonFile) {
            await loadJsonConfig(jsonFile);
          }
        } finally {
          loadingIndicator.classList.remove("active");
          pairInput.value = "";
        }
      });

      processStackBtn.addEventListener("click", () => {
        void loadDefaultProcessStack();
      });

      derivedGeometryBtn.addEventListener("click", () => {
        void loadDefaultDerivedGeometry();
      });

      container.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("active");
      });

      container.addEventListener("dragleave", (e) => {
        if (!container.contains(e.relatedTarget)) {
          dropZone.classList.remove("active");
        }
      });

      container.addEventListener("drop", async (e) => {
        e.preventDefault();
        dropZone.classList.remove("active");
        const file = e.dataTransfer.files[0];
        if (file && (file.name.endsWith(".gds") || file.name.endsWith(".gdsii"))) {
          hideSidebar();
          currentFile = null;
          loadingIndicator.classList.add("active");
          try {
            await viewer.loadGdsFile(file);
          } finally {
            loadingIndicator.classList.remove("active");
          }
        }
      });
    </script>
  </body>
</html>
