<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDS Viewer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f5f5f5;
        color: #333;
      }
      .app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      header {
        padding: 12px 20px;
        background: #fff;
        border-bottom: 1px solid #ddd;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      header h1 {
        font-size: 18px;
        font-weight: 600;
      }
      .header-controls {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .upload-btn {
        padding: 8px 16px;
        background: #4a4a8a;
        border: none;
        border-radius: 6px;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
      }
      .upload-btn:hover {
        background: #5a5a9a;
      }
      #file-input,
      #lyp-input,
      #pair-input {
        display: none;
      }
      .main-content {
        flex: 1;
        display: flex;
        overflow: hidden;
      }
      .intro-note {
        padding: 10px 20px;
        background: #fafafa;
        border-bottom: 1px solid #ddd;
        color: #666;
        font-size: 14px;
      }
      .viewer-container {
        flex: 1;
        position: relative;
      }
      gds-viewer {
        width: 100%;
        height: 100%;
        display: block;
      }
      .drop-zone {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(74, 74, 138, 0.2);
        border: 3px dashed #4a4a8a;
        border-radius: 12px;
        margin: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .drop-zone.active {
        opacity: 1;
        pointer-events: auto;
      }
      .drop-zone p {
        font-size: 20px;
        color: #4a4a8a;
      }
      .loading-indicator {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255,255,255,0.95);
        padding: 20px 28px;
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        font-size: 14px;
        color: #666;
        display: none;
        text-align: center;
        min-width: 200px;
      }
      .loading-indicator.active {
        display: block;
      }
      .loading-indicator .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #e0e0e0;
        border-top-color: #4a4a8a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>GDS Viewer</h1>
        <div class="header-controls">
          <label class="upload-btn" style="background:#2f5b8a;">
            Open GDS/LYP/JSON
            <input
              type="file"
              id="pair-input"
              accept=".gds,.gdsii,.lyp,.json"
              multiple
            />
          </label>
        </div>
      </header>
      <div class="intro-note">Load local GDS, LYP, process-stack, or derived-geometry JSON files.</div>
      <div class="main-content">
        <div class="viewer-container">
          <gds-viewer id="viewer" lyp-layer-ordering="lyp-reverse"></gds-viewer>
          <div class="drop-zone" id="drop-zone">
            <p>Drop GDS file here</p>
          </div>
          <div class="loading-indicator" id="loading-indicator">
            <div class="spinner"></div>
            <div id="loading-text">Loading GDS file...</div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import "./src/index.ts";

      const viewer = document.getElementById("viewer");
      const pairInput = document.getElementById("pair-input");
      const dropZone = document.getElementById("drop-zone");
      const container = document.querySelector(".viewer-container");
      const loadingIndicator = document.getElementById("loading-indicator");

      pairInput.addEventListener("change", async (e) => {
        const files = Array.from(e.target.files || []);
        const gdsFile = files.find((file) => {
          const name = file.name.toLowerCase();
          return name.endsWith(".gds") || name.endsWith(".gdsii");
        });
        const lypFile = files.find((file) =>
          file.name.toLowerCase().endsWith(".lyp"),
        );
        const jsonFile = files.find((file) =>
          file.name.toLowerCase().endsWith(".json"),
        );

        if (!gdsFile && !lypFile && !jsonFile) return;

        async function loadJsonConfig(file) {
          const text = await file.text();
          let parsed;
          try {
            parsed = JSON.parse(text);
          } catch (err) {
            alert("Invalid JSON file.");
            return;
          }

          if (parsed && typeof parsed === "object" && parsed.format === "gds-viewer-derived-geometry@1") {
            await viewer.loadDerivedGeometryFromString(text);
            return;
          }

          await viewer.loadProcessStackFromString(text);
        }

        loadingIndicator.classList.add("active");
        try {
          if (gdsFile && lypFile) {
            await viewer.loadGdsAndLypFiles(gdsFile, lypFile);
          } else if (gdsFile && jsonFile) {
            await viewer.loadGdsFile(gdsFile);
            await loadJsonConfig(jsonFile);
          } else if (gdsFile) {
            await viewer.loadGdsFile(gdsFile);
          } else if (lypFile) {
            await viewer.loadLypFile(lypFile);
          } else if (jsonFile) {
            await loadJsonConfig(jsonFile);
          }
        } finally {
          loadingIndicator.classList.remove("active");
          pairInput.value = "";
        }
      });

      container.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("active");
      });

      container.addEventListener("dragleave", (e) => {
        if (!container.contains(e.relatedTarget)) {
          dropZone.classList.remove("active");
        }
      });

      container.addEventListener("drop", async (e) => {
        e.preventDefault();
        dropZone.classList.remove("active");
        const file = e.dataTransfer.files[0];
        if (file && (file.name.endsWith(".gds") || file.name.endsWith(".gdsii"))) {
          loadingIndicator.classList.add("active");
          try {
            await viewer.loadGdsFile(file);
          } finally {
            loadingIndicator.classList.remove("active");
          }
        }
      });
    </script>
  </body>
</html>
